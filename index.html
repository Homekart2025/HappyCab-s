<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Cab's Driver Management Pro</title>
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e293b">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header>
        <div class="header-box">
            <div class="menu-trigger" onclick="toggleMenu()">⋮</div>
            <div class="header-main">
                <img src="logo.png" class="logo" alt="Logo">
                <h1 class="brand-title">Happy Cab's Billing Desk</h1>
            </div>
        </div>
    </header>

    <nav id="sideMenu" class="side-nav">
        <div class="drawer-header">
            <span class="drawer-brand">Control Panel</span>
            <div class="menu-close" onclick="toggleMenu()">×</div>
        </div>
        <div class="menu-links">
            <button onclick="showPage('homePage')"><span class="icon">🏠</span> Home Panel</button>
            <button onclick="showPage('addDriverPage')"><span class="icon">➕</span> Add Driver</button>
            <button onclick="showPage('summaryPage'); renderControlPanelSummary();"><span class="icon">📊</span> Bill Summary</button>
            <button onclick="exportBackup()"><span class="icon">💾</span> Backup Data</button>
            <label class="restore-btn">
                <span class="icon">📂</span> Restore Data
                <input type="file" id="restoreFile" onchange="importBackup(event)" hidden>
            </label>
        </div>
    </nav>
    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <section class="dashboard">
        <div class="dash-card">
            <h3>Total Active Drivers</h3>
            <span id="totalDrivers">0</span>
        </div>
    </section>

    <section id="homePage" class="page">
        <div class="card search-card">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchDriver" placeholder="Search Driver..." onkeyup="searchDriver()">
                <button class="clear-btn" onclick="clearSearch()">×</button>
            </div>
        </div>
        <div id="driverCards"></div>
    </section>

    <section id="addDriverPage" class="page" style="display:none;">
        <div class="card">
            <h2>Add New Driver</h2>
            <input type="text" id="driverName" placeholder="Driver Name">
            <input type="text" id="driverPhone" placeholder="Phone Number">
            <button onclick="saveDriver()">Save Driver</button>
        </div>
    </section>

    <section id="driverMenuPage" class="page" style="display:none;">
        <div class="card info-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 id="menuDriverTitle" style="margin:0;">Driver Options</h2>
                <button onclick="showPage('homePage')" style="width: auto; padding: 6px 12px; font-size: 12px; margin:0; background:#64748b;">Back</button>
            </div>
            <p id="menuDriverPhoneText" style="color: #64748b; font-size: 13px;"></p>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0;">
            
            <button onclick="openCreateBill()" style="background: #008060; color: white; margin-bottom: 10px;">1. Create Bill</button>
            <button onclick="openBillDetails()" style="background: #1e293b; color: white; margin-bottom: 10px;">2. Bill Details</button>
            <button onclick="openPaymentsLedger()" style="background: #25D366; color: white;">3. Payments & Ledger</button>
        </div>
    </section>

    <section id="driverPage" class="page" style="display:none;">
        <div class="card info-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 id="driverTitle" style="margin:0;">Driver Details</h2>
                <button onclick="showPage('driverMenuPage')" style="width: auto; padding: 6px 12px; font-size: 12px; margin:0; background:#64748b;">Back to Menu</button>
            </div>
            <p id="driverPhoneText" style="color: #64748b; font-size: 13px;"></p>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0;">

            <input type="text" id="vehicleNumber" placeholder="Vehicle Number" style="text-transform: uppercase;">
            
            <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                <div style="flex: 1;">
                    <label style="font-size: 12px; font-weight: bold; color: #64748b;">Date From</label>
                    <input type="date" id="weekStart" style="margin-top:4px;" onkeydown="nextField(event)">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 12px; font-weight: bold; color: #64748b;">Date Up To</label>
                    <input type="date" id="weekEnd" style="margin-top:4px;" onkeydown="nextField(event)">
                </div>
            </div>

            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Trips</label>
            <input type="number" id="tripCount" placeholder="Trips" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Cash Collection</label>
            <input type="number" id="cashCollection" placeholder="Cash Collection" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Total Earnings</label>
            <input type="number" id="totalEarnings" placeholder="Total Earnings" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Drive Pass</label>
            <input type="number" id="drivePass" placeholder="Drive Pass" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Toll</label>
            <input type="number" id="toll" placeholder="Toll" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Insurance</label>
            <input type="number" id="insurance" placeholder="Insurance" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Traffic Fine</label>
            <input type="number" id="trafficFine" placeholder="Traffic Fine" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Daily Rent</label>
            <input type="number" id="dailyRent" placeholder="Daily Rent" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #475569;">Old Balance (Auto Calculated)</label>
            <input type="number" id="oldBalance" placeholder="Old Balance" readonly style="background-color: #f1f5f9; font-weight: bold;">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Additional Rent</label>
            <input type="number" id="additionalRent" placeholder="Additional Rent" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Bill Redemption</label>
            <input type="number" id="billRedemption" placeholder="Bill Redemption" onkeydown="nextField(event)">
            
            <label style="font-size: 12px; font-weight: bold; color: #475569;">Fuel Variations (From Payments)</label>
            <input type="number" id="fuelVariations" placeholder="Fuel Variations" readonly style="background-color: #f1f5f9;">
            
            <label style="font-size: 12px; font-weight: bold; color: #475569;">Vehicle Expenses (From Payments)</label>
            <input type="number" id="vehicleExpenses" placeholder="Vehicle Expenses" readonly style="background-color: #f1f5f9;">

            <label style="font-size: 12px; font-weight: bold; color: #475569;">Total Amount Collected (Auto Summed)</label>
            <input type="number" id="amountCollected" placeholder="Amount Collected" readonly style="background-color: #f1f5f9; font-weight: bold;">

            <button onclick="calculateBill()">Calculate Bill</button>

            <div id="billResult"></div>

            <button onclick="saveBill()" style="background: #1e293b; color: white; margin-top: 10px;">Save Bill</button>
            <button onclick="sendWhatsAppBill()" style="background: #25D366; color: white; margin-top: 10px;">📤 Send Bill Image via WhatsApp</button>
        </div>
    </section>

    <section id="billDetailsPage" class="page" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Bill Details History</h2>
                <button onclick="showPage('driverMenuPage')" style="width: auto; padding: 6px 12px; font-size: 12px; margin:0; background:#64748b;">Back</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="font-size: 12px; font-weight: bold;">Filter Start Date</label>
                    <input type="date" id="historyFilterStart" onchange="loadBillHistory()">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 12px; font-weight: bold;">Filter End Date</label>
                    <input type="date" id="historyFilterEnd" onchange="loadBillHistory()">
                </div>
            </div>

            <div id="billHistoryTotalSummary" style="background: #f8fafc; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; line-height: 1.5; border: 1px solid #e2e8f0;"></div>

            <div id="billHistory"></div>
        </div>
    </section>

    <section id="paymentsLedgerPage" class="page" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Payments & Ledger</h2>
                <button onclick="showPage('driverMenuPage')" style="width: auto; padding: 6px 12px; font-size: 12px; margin:0; background:#64748b;">Back</button>
            </div>

            <div style="background: #f8fafc; padding: 14px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; border: 1px solid #e2e8f0; line-height: 1.7;">
                <div><b>Current Ledger Balance:</b> <span id="ledgerCurrentBalance" style="font-weight: bold; color: #1e293b;">₹0.00</span></div>
                <div style="margin-top: 4px; padding-top: 4px; border-top: 1px dashed #cbd5e1;"><b>Daily Office Advance:</b> <span id="ledgerCurrentAdvance" style="font-weight: bold; color: #d82c0d;">₹0.00</span></div>
            </div>

            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Fuel Variations</label>
            <input type="number" id="ledgerFuel" placeholder="Enter Fuel Variations Amount">

            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Vehicle Expenses</label>
            <input type="number" id="ledgerVehicleExpense" placeholder="Enter Vehicle Expenses">

            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Bill Amount Collected</label>
            <input type="number" id="ledgerBillCollected" placeholder="Enter Bill Amount Collected" oninput="liveUpdateLedgerDisplay()">

            <label style="font-size: 12px; font-weight: bold; color: #64748b;">Daily Office Advance</label>
            <input type="number" id="ledgerDailyAdvance" placeholder="Enter Daily Office Advance" oninput="liveUpdateLedgerDisplay()">

            <button onclick="saveLedgerEntry()" style="background: #008060; color: white; margin-top: 10px;">Save Ledger Values</button>
        </div>
    </section>

    <section id="summaryPage" class="page" style="display:none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Control Panel Bill Summary</h2>
                <button onclick="showPage('homePage')" style="width: auto; padding: 6px 12px; font-size: 12px; margin:0; background:#64748b;">Back</button>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="font-size: 12px; font-weight: bold;">Select Start Date</label>
                    <input type="date" id="summaryStart" onchange="renderControlPanelSummary()">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 12px; font-weight: bold;">Select End Date</label>
                    <input type="date" id="summaryEnd" onchange="renderControlPanelSummary()">
                </div>
            </div>

            <div id="controlPanelSummaryResult"></div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
